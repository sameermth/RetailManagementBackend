name: Build, Test, and Deploy on Release

on:
  push:
    branches:
      - release/*

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from branch name
      id: version
      run: |
        BRANCH_NAME="${{ github.ref_name }}"
        VERSION="${BRANCH_NAME#release/}"
        SHA_SHORT="${GITHUB_SHA::12}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
        echo "Docker image tags: $VERSION, sha-$SHA_SHORT, latest"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests
      run: ./gradlew test

    - name: Check if tag exists on remote
      id: check_tag
      run: |
        git fetch --tags
        if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.version }} already exists on remote. Skipping tag creation."
        else
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.version }} does not exist. Creating tag."
        fi

    - name: Create Git tag
      if: steps.check_tag.outputs.tag_exists == 'false'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag -a "${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.version }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/retail-management-backend:${{ steps.version.outputs.version }}
          ghcr.io/${{ github.repository_owner }}/retail-management-backend:sha-${{ steps.version.outputs.sha_short }}
          ghcr.io/${{ github.repository_owner }}/retail-management-backend:latest
        labels: |
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.title=retail-management-backend
