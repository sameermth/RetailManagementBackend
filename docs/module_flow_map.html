<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail ERP Module Flow Map</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-alt: #f1f4f9;
      --text: #142033;
      --muted: #5f6f86;
      --line: #d8e0ec;
      --primary: #1f6feb;
      --primary-soft: #eaf2ff;
      --success: #0f9d58;
      --warning: #b26a00;
      --shadow: 0 10px 30px rgba(18, 38, 63, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3fb 100%);
      color: var(--text);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 52%, #2a5fa8 100%);
      color: #fff;
      border-radius: 24px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      max-width: 900px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    .sidebar,
    .content {
      background: var(--panel);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 20px;
      position: sticky;
      top: 20px;
    }

    .sidebar h2,
    .content h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .module-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .module-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 14px 14px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
      font-weight: 600;
    }

    .module-btn small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 500;
    }

    .module-btn:hover,
    .module-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      transform: translateY(-1px);
    }

    .content {
      padding: 24px;
    }

    .module-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .module-header h2 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .module-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 18px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .tab-btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .overview-card {
      background: var(--panel-alt);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .overview-card h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .overview-card p,
    .overview-card li {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .overview-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .flow-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .flow-track {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 100%;
      padding: 10px 2px 18px;
    }

    .step {
      min-width: 200px;
      max-width: 240px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(18, 38, 63, 0.05);
      cursor: pointer;
    }

    .step.type-create {
      border-color: #c8e6d3;
      background: #f3fbf6;
    }

    .step.type-convert {
      border-color: #cfe0ff;
      background: #f4f8ff;
    }

    .step.type-post {
      border-color: #ffe4b5;
      background: #fff8ec;
    }

    .step.type-approve {
      border-color: #ead7ff;
      background: #faf5ff;
    }

    .step.type-track {
      border-color: #d8e3ea;
      background: #f7fafc;
    }

    .step.type-report {
      border-color: #ffd6d6;
      background: #fff7f7;
    }

    .step .index {
      display: inline-block;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      text-align: center;
      line-height: 26px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .step h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .step .meta {
      margin-top: 10px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
    }

    .arrow {
      color: var(--primary);
      font-size: 26px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .notes {
      margin-top: 8px;
      padding: 16px;
      background: #fbfcff;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .notes h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .notes ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .detail-box {
      margin-top: 16px;
      padding: 16px;
      background: #fbfcff;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .detail-box h3 {
      margin: 0;
      font-size: 16px;
    }

    .detail-box p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .detail-card h4 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .detail-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .detail-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .collapse-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .detail-content.collapsed {
      display: none;
    }

    @media (max-width: 820px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .step {
        min-width: 180px;
      }
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 16px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Retail ERP Process Map</h1>
      <p>
        Click any module on the left to view the current implemented process flow, operational screens, and approval or exception handling.
        This page is self-contained and can be opened directly without build steps or internet dependency.
      </p>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <h2>Modules</h2>
        <div id="moduleList" class="module-list"></div>
      </aside>

      <main class="content">
        <div class="module-header">
          <div>
            <h2 id="moduleTitle"></h2>
            <p id="moduleSummary"></p>
          </div>
          <div id="moduleBadge" class="badge"></div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="overview">Overview</button>
          <button class="tab-btn" data-tab="flow">Transaction Flow</button>
          <button class="tab-btn" data-tab="approvals">Approvals / Exceptions</button>
        </div>

        <section id="overview" class="panel active"></section>
        <section id="flow" class="panel"></section>
        <section id="approvals" class="panel"></section>
      </main>
    </div>
  </div>

  <script>
    const modules = [
      {
        key: "identity",
        name: "Identity & Session",
        badge: "Security",

            { title: "Main Records", bullets: ["Person", "Auth account", "Organization membership", "Refresh session", "Role and permission map"] },
            { title: "Typical Users", body: "Owners, managers, employees, and platform admins with multi-organization access." }
          ]

          { type: "post", title: "Issue Access + Refresh Tokens", text: "Client type is resolved and a token pair is issued with matching expiration strategy.", screens: ["Session Summary"], outcome: "Web and mobile behavior stays secure but practical for daily usage." },
          { type: "track", title: "Attach Permission + Feature Snapshot", text: "Response includes role permissions and subscription feature snapshot.", screens: ["Permission Gate"], outcome: "UI can render enabled or disabled actions correctly." },
          { type: "convert", title: "Switch Organization", text: "User switches store context without re-entering credentials.", screens: ["Organization Switch"], outcome: "Same account can operate across allowed organizations safely." },
          { type: "track", title: "Refresh Rotation", text: "Refresh token usage rotates session state and extends active sessions.", screens: ["Silent Refresh"], outcome: "Session continuity improves while preserving revocation control." },
          { type: "post", title: "Logout and Revoke", text: "Logout revokes refresh sessions and clears active security context.", screens: ["Logout"], outcome: "Token misuse risk is minimized after sign-out." }
        ],
        approvals: {
          pills: ["Role and permission checks", "Subscription feature checks", "Branch-scoped visibility"],
          notes: [
            "Organization switch is explicit and auditable.",
            "Refresh sessions enforce expiry and inactivity timeout handling.",
            "UI access should be disabled-state aware, not hidden-only."
          ]
        }
      },
      {
        key: "foundation",
        name: "Owner Setup & Teams",
        badge: "Foundation",
        summary: "Owner subscription drives organization count, then branches, warehouses, and employees are set up for operations.",
        overview: {
          cards: [
            { title: "Primary Goal", body: "Prepare each store structure so all commerce and inventory flows have valid operating context." },
            { title: "Main Records", bullets: ["Owner profile", "Organization", "Branch", "Warehouse", "Employee membership", "Branch allocation"] },
            { title: "Important Rule", body: "Subscription belongs to owner account and is applied across all organizations owned by that account." }
          ]
        },
        flow: [
          { type: "track", title: "Load Owner Subscription", text: "System evaluates owner plan limits and enabled features.", screens: ["Subscription Overview"], outcome: "Org creation and advanced modules follow plan entitlements." },
          { type: "create", title: "Create or Edit Organization", text: "Owner creates store entities within allowed organization limits.", screens: ["Organization List", "Organization Form"], outcome: "New business entities become available for downstream setup." },
          { type: "create", title: "Add Branches", text: "Operational branches are added under organization.", screens: ["Branch List", "Branch Form"], outcome: "Transactions can be scoped to real operating locations." },
          { type: "create", title: "Add Warehouses", text: "Storage locations are created per branch for inventory control.", screens: ["Warehouse List", "Warehouse Form"], outcome: "Stock movement can be tied to the right physical location." },
          { type: "create", title: "Create Employees", text: "Employees are onboarded with role and identity linkage.", screens: ["Employee List", "Employee Form"], outcome: "Human access is managed with explicit org membership." },
          { type: "track", title: "Assign Branch Access", text: "Employee visibility is narrowed to one or more assigned branches.", screens: ["Branch Access Mapping"], outcome: "Store teams only see and act where they are allowed." }
        ],
        approvals: {
          pills: ["Organization limit checks", "Role-based onboarding", "Branch allocation checks"],
          notes: [
            "Enterprise-style plans can allow unlimited organizations.",
            "Organization ownership is the key subscription propagation boundary.",
            "Branch access is separate from generic user activation."
          ]
        }
      },
      {
        key: "catalog",
        name: "Catalog & Pricing",
        badge: "Master Data",
        summary: "Shared product identity, store product linkage, HSN mapping, dynamic attributes, pricing, and supplier preferences.",
        overview: {
          cards: [
            { title: "Primary Goal", body: "Keep global product consistency while allowing store-level operational control." },
            { title: "Main Records", bullets: ["Shared product", "Store product", "HSN reference", "Dynamic attributes", "Price tiers", "Preferred suppliers"] },
            { title: "Important Rule", body: "SKU and operational behavior are store-level; shared product identity remains reusable." }
          ]
        },
        flow: [
          { type: "track", title: "Search Shared Catalog", text: "User discovers existing shared product or prepares new store link.", screens: ["Catalog Search", "Discover List"], outcome: "Duplicate product creation is reduced across stores." },
          { type: "create", title: "Create or Link Store Product", text: "Store product record is created with SKU and operational fields.", screens: ["New Item", "Link Item"], outcome: "Product becomes sellable and inventory-aware for that organization." },
          { type: "track", title: "Resolve HSN and Tax Group", text: "HSN lookup and tax group suggestion are applied for GST behavior.", screens: ["HSN Picker", "Tax Group Picker"], outcome: "Tax posting and reports stay classification-consistent." },
          { type: "create", title: "Configure Dynamic Attributes", text: "Attribute definitions and values are attached based on category or brand context.", screens: ["Variant Attribute Builder"], outcome: "UI and backend handle variant-style product detail without hardcoding fields." },
          { type: "create", title: "Maintain Price Tiers", text: "Multiple price lines are maintained for customer segments or channels.", screens: ["Price Grid"], outcome: "Commercial flexibility is available without duplicate products." },
          { type: "track", title: "Attach Supplier Preferences", text: "Store product can map to one or more supplier relationships.", screens: ["Supplier Mapping"], outcome: "Procurement has direct product-to-supplier options." }
        ],
        approvals: {
          pills: ["Catalog manage permission", "HSN-driven consistency", "Store-level SKU uniqueness"],
          notes: [
            "Reference pickers for category, brand, UOM, and tax group are searchable.",
            "Store product response includes display fields to support user-friendly forms.",
            "Warranty defaults can be maintained at store product level."

      },
      {
        key: "purchase",

        summary: "Supplier relationship setup, purchase order lifecycle, goods receipt posting, and supplier payment allocations.",

            { title: "Primary Goal", body: "Convert supplier intent into receipted stock and settled payables with clear traceability." },

            { title: "Important Rule", body: "Receipt posting is where inventory and payable impact become effective." }
          ]
        },
        flow: [
          { type: "create", title: "Create Supplier Relationship", text: "Supplier profile, commercial terms, and product links are captured.", screens: ["Supplier Master", "Supplier Terms"], outcome: "The supplier becomes purchase-ready for this organization." },

        approvals: {

          notes: [

            "Receipt detail includes linked supplier payment allocation context.",
            "Supplier product preferences improve recurring buying decisions."

        }
      },
      {
        key: "sales",

          { type: "create", title: "Create Quote or Estimate", text: "Commercial proposal is raised without posting inventory or accounts.", screens: ["Quote Form", "Quote Detail"], outcome: "Negotiation can happen before hard commitment." },

          { type: "track", title: "Handle Cancellation Paths", text: "Quotes and orders can be cancelled with reason and state tracking.", screens: ["Cancellation Action"], outcome: "Pipeline hygiene stays clean without manual data drift." },
          { type: "track", title: "Issue and Allocate Receipts", text: "Customer receipts are created and allocated against invoices.", screens: ["Receipt Form", "Allocation Drawer"], outcome: "Outstanding status transitions from unpaid to partial to paid." }

        approvals: {
          pills: ["Sales create/post permissions", "Cancellation controls", "Settlement visibility"],
          notes: [
            "Invoice detail includes linked receipt allocation history.",
            "Sales quote, order, invoice, and receipt all support document output.",
            "UI can show disabled actions with no-access or upgrade messaging."

        }
      },
      {
        key: "inventory",
        name: "Inventory Control",
        badge: "Stock",

        },
        flow: [

    const moduleList = document.getElementById("moduleList");
    const moduleTitle = document.getElementById("moduleTitle");
    const moduleSummary = document.getElementById("moduleSummary");
    const moduleBadge = document.getElementById("moduleBadge");
    const overviewPanel = document.getElementById("overview");
    const flowPanel = document.getElementById("flow");
    const approvalsPanel = document.getElementById("approvals");
    const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));

    let activeModuleKey = modules[0].key;

    function renderModuleButtons() {
      moduleList.innerHTML = "";
      modules.forEach((module) => {
        const btn = document.createElement("button");
        btn.className = "module-btn" + (module.key === activeModuleKey ? " active" : "");
        btn.innerHTML = `${module.name}<small>${module.buttonsNote || module.summary}</small>`;
        btn.onclick = () => {
          activeModuleKey = module.key;
          renderModuleButtons();
          renderModule();
        };
        moduleList.appendChild(btn);
      });
    }

    function renderOverview(module) {
      overviewPanel.innerHTML = `
        <div class="overview-grid">
          ${module.overview.cards.map(card => `
            <div class="overview-card">
              <h3>${card.title}</h3>
              ${card.body ? `<p>${card.body}</p>` : ""}
              ${card.bullets ? `<ul>${card.bullets.map(item => `<li>${item}</li>`).join("")}</ul>` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderFlow(module) {
      flowPanel.innerHTML = `
        <div class="legend">
          <div class="legend-item"><span class="legend-swatch" style="background:#dff3e6;"></span>Create</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#e2ecff;"></span>Convert</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#fff0d8;"></span>Post</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#f0e3ff;"></span>Approve</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#edf3f7;"></span>Track</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#ffe5e5;"></span>Report</div>
        </div>
        <div class="flow-scroll">
          <div class="flow-track">
            ${module.flow.map((step, index) => `
              ${index > 0 ? `<div class="arrow">→</div>` : ""}
              <div class="step type-${step.type || "track"}" data-step-index="${index}">
                <div class="index">${index + 1}</div>
                <h4>${step.title}</h4>
                <p>${step.text}</p>
                <div class="meta">Click for details</div>
              </div>
            `).join("")}
          </div>
        </div>
        <div id="stepDetail" class="detail-box">
          ${renderStepDetail(module.flow[0])}
        </div>
      `;

      Array.from(flowPanel.querySelectorAll(".step")).forEach((stepNode) => {
        stepNode.addEventListener("click", () => {
          const step = module.flow[Number(stepNode.dataset.stepIndex)];
          flowPanel.querySelector("#stepDetail").innerHTML = renderStepDetail(step);
          bindDetailToggle();
        });
      });

      bindDetailToggle();
    }

    function renderStepDetail(step) {
      return `
        <div class="detail-header">
          <h3>${step.title}</h3>
          <button type="button" class="collapse-btn" id="detailToggle">Collapse</button>
        </div>
        <div class="detail-content" id="detailContent">
          <p>${step.text}</p>
          <div class="detail-grid">
            <div class="detail-card">
              <h4>Suggested Screens</h4>
              <ul>
                ${(step.screens || ["No screen mapping yet"]).map(item => `<li>${item}</li>`).join("")}
              </ul>
            </div>
            <div class="detail-card">
              <h4>Business Outcome</h4>
              <p>${step.outcome || "This step moves the workflow forward in the current module."}</p>
            </div>
          </div>
        </div>
      `;
    }

    function bindDetailToggle() {
      const toggle = document.getElementById("detailToggle");
      const content = document.getElementById("detailContent");
      if (!toggle || !content) {
        return;
      }
      toggle.onclick = () => {
        const collapsed = content.classList.toggle("collapsed");
        toggle.textContent = collapsed ? "Expand" : "Collapse";
      };
    }

    function renderApprovals(module) {
      approvalsPanel.innerHTML = `
        <div class="pill-list">
          ${module.approvals.pills.map(pill => `<div class="pill">${pill}</div>`).join("")}
        </div>
        <div class="notes">
          <h3>What To Remember</h3>
          <ul>
            ${module.approvals.notes.map(note => `<li>${note}</li>`).join("")}
          </ul>
        </div>
      `;
    }

    function renderModule() {
      const module = modules.find(item => item.key === activeModuleKey);
      moduleTitle.textContent = module.name;
      moduleSummary.textContent = module.summary;
      moduleBadge.textContent = module.badge;
      renderOverview(module);
      renderFlow(module);
      renderApprovals(module);
    }

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        tabButtons.forEach((tab) => tab.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
        button.classList.add("active");
        document.getElementById(button.dataset.tab).classList.add("active");
      });
    });

    renderModuleButtons();
    renderModule();
  </script>
