# Azure Profile for Kubernetes/Cloud deployment
# Activate with: --spring.profiles.active=azure

# Database Connection (Azure PostgreSQL)
# Uses environment variables from Kubernetes secrets
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?currentSchema=retail_management_service&ssl=true&sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling - Optimized for containers
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Liquibase - Auto-initialize schema on startup
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yml
spring.liquibase.drop-first=false

# JPA Configuration
# Liquibase is the schema source of truth in Azure.
# Keep Hibernate from hard-failing startup on validation mismatch.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Contexts - seed only, no demo data in production
spring.liquibase.contexts=seed

# Actuator exposure for Azure probes/monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Logging
logging.level.com.retailmanagement=INFO
logging.level.org.liquibase=INFO
logging.level.org.springframework.jdbc=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=reza.sameer200@gmail.com
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

# SMS API
sms.api.url=https://api.smsprovider.com/send
sms.api.key=your_sms_api_key
sms.sender.id=RetailMgmt

# ERP Tax integration
erp.tax.integration.lookup-provider=DISABLED
erp.tax.integration.compliance-provider=DISABLED
erp.tax.integration.http.enabled=false
