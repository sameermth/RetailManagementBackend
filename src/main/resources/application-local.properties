# Local overrides for development
# Activate with: --spring.profiles.active=local

spring.datasource.url=jdbc:postgresql://localhost:5432/retail_management_db?currentSchema=retail_management_service
spring.datasource.username=retail_admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.liquibase.contexts=seed,demo

jwt.secret=local-dev-secret-key-for-retail-management-32b

# Optional local HTTPS (disabled by default).
# Set SERVER_SSL_ENABLED=true to enable and provide keystore values.
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:retail-local}

# ClearTax sandbox-ready placeholders for local development.
# Keep disabled until sandbox credentials and exact endpoint paths are available.
erp.tax.integration.lookup-provider=${ERP_TAX_LOOKUP_PROVIDER:DISABLED}
erp.tax.integration.compliance-provider=${ERP_TAX_COMPLIANCE_PROVIDER:DISABLED}
erp.tax.integration.http.enabled=${ERP_TAX_HTTP_ENABLED:false}
erp.tax.integration.http.provider-code=${ERP_TAX_HTTP_PROVIDER_CODE:CLEARTAX_SANDBOX}
erp.tax.integration.http.provider-name=${ERP_TAX_HTTP_PROVIDER_NAME:ClearTax Sandbox}
erp.tax.integration.http.base-url=${ERP_TAX_HTTP_BASE_URL:https://api-sandbox.clear.in/gsp}
erp.tax.integration.http.submit-path=${ERP_TAX_HTTP_SUBMIT_PATH:/submit}
erp.tax.integration.http.sync-path=${ERP_TAX_HTTP_SYNC_PATH:/sync-status}
erp.tax.integration.http.auth-header-name=${ERP_TAX_HTTP_AUTH_HEADER_NAME:X-CT-Auth-Token}
erp.tax.integration.http.auth-token=${ERP_TAX_HTTP_AUTH_TOKEN:}
