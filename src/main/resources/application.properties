# Application
spring.application.name=retail-management
server.port=8080
# SSL is opt-in and intended for upper environments that terminate TLS at app/container level.
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:retail}
server.ssl.key-password=${SERVER_SSL_KEY_PASSWORD:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://localhost:5173,https://localhost:3000}

#spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yml
spring.liquibase.drop-first=false
spring.jpa.properties.hibernate.use_sql_comments=true

#logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.yourpackage=DEBUG
# JPA
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
auth.refresh.mobile.expiration-days=30
auth.refresh.web.expiration-days=1
auth.refresh.inactivity-days=7

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=reza.sameer200@gmail.com
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

# Logging
logging.level.com.retailmanagement=DEBUG

# SMS API DETAILS
sms.api.url=https://api.smsprovider.com/send
sms.api.key=your_sms_api_key
sms.sender.id=RetailMgmt

# ERP Tax integration
erp.tax.integration.lookup-provider=DISABLED
erp.tax.integration.compliance-provider=DISABLED
erp.tax.integration.http.enabled=false
erp.tax.integration.http.provider-code=HTTP
erp.tax.integration.http.provider-name=Configured GST Provider
erp.tax.integration.http.base-url=
erp.tax.integration.http.submit-path=/submit
erp.tax.integration.http.sync-path=/sync-status
erp.tax.integration.http.auth-header-name=
erp.tax.integration.http.auth-token=
erp.sales.payments.gateway-provider=MANUAL
