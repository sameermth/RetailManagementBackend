databaseChangeLog:
  - changeSet:
      id: bootstrap-001-schema
      author: sameer
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: organization
      changes:
        - sqlFile:
            path: bootstrap/001_bootstrap_schema.sql
            relativeToChangelogFile: true
            splitStatements: false
            endDelimiter: ";"
      rollback:
        - sql:
            sql: "SELECT 'Manual rollback required for bootstrap schema';"

  - changeSet:
      id: bootstrap-002-master-data
      author: sameer
      context: seed
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM role WHERE code = 'OWNER'"
      changes:
        - sqlFile:
            path: bootstrap/002_bootstrap_master_data.sql
            relativeToChangelogFile: true
            splitStatements: false
            endDelimiter: ";"
      rollback:
        - sql:
            sql: "SELECT 'Manual rollback required for bootstrap master data';"

  - changeSet:
      id: bootstrap-003-demo-data
      author: sameer
      context: demo
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM organization WHERE code IN ('SPC','UHL')"
      changes:
        - sqlFile:
            path: bootstrap/003_bootstrap_demo_data.sql
            relativeToChangelogFile: true
            splitStatements: false
            endDelimiter: ";"
      rollback:
        - sql:
            sql: "SELECT 'Manual rollback required for bootstrap demo data';"
