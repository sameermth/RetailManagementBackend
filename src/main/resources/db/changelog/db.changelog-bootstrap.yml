databaseChangeLog:
  - changeSet:
      id: bootstrap-001-schema
      author: sameer
      validCheckSum:
        - "9:13928b78bbf527f34937c1a90c59147e"
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: organization
      changes:
        - sqlFile:
            path: bootstrap/001_bootstrap_schema.sql
            relativeToChangelogFile: true
            splitStatements: false
            endDelimiter: ";"
      rollback:
        - sql:
            sql: "SELECT 'Manual rollback required for bootstrap schema';"

  - changeSet:
      id: bootstrap-002-master-data
      author: sameer
      context: seed
      preConditions:
        - onFail: MARK_RAN
      changes:
