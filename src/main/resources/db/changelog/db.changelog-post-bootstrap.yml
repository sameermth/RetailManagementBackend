databaseChangeLog:
  - changeSet:
      id: post-bootstrap-001-add-report-storage
      author: sameer
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: reports
      changes:
        - sqlFile:
            path: post-bootstrap/001_add_report_storage.sql
            relativeToChangelogFile: true
            splitStatements: false
            endDelimiter: ";"
      rollback:
        - sql:
            sql: "SELECT 'Manual rollback required for report storage migration';"
